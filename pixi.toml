[workspace]
name = "slamv2"
version = "0.1.0"
description = "CEV SLAMv2 - Lidar odometry and pose graph SLAM"
channels = ["robostack-staging", "conda-forge"]
platforms = ["linux-aarch64", "linux-64"]

[dependencies]
# ROS2 Humble — packages required by both ROS2 nodes
ros-humble-rclcpp = "*"
ros-humble-sensor-msgs = "*"
ros-humble-nav-msgs = "*"
ros-humble-geometry-msgs = "*"
ros-humble-tf2 = "*"
ros-humble-tf2-ros = "*"
ros-humble-tf2-eigen = "*"
ros-humble-message-filters = "*"
# Converts Robosense PointCloud2 (/rslidar_points) → LaserScan (/scan)
ros-humble-pointcloud-to-laserscan = "*"
# Sensor fusion — EKF/UKF fusing ICP odometry + IMU
ros-humble-robot-localization = "*"
# Foxglove live visualization bridge (port 8765)
ros-humble-foxglove-bridge = "*"
# ROS2 build infrastructure
ros-humble-ament-cmake = "*"
ros-humble-ament-lint-auto = "*"
ros-humble-ament-lint-common = "*"
ros-humble-launch = "*"
ros-humble-launch-ros = "*"
# ros2 CLI (needed for `ros2 launch`, `ros2 pkg executables`, etc.)
ros-humble-ros2cli-common-extensions = "*"
# rosbag2 — needed for `ros2 bag play/record` and .db3 file support
ros-humble-rosbag2 = "*"
# C++ build tools
cmake = ">=3.15"
make = "*"
compilers = "*"
pkg-config = "*"
# Linear algebra (required by both icp and cev_lidar_odometry_ros2)
eigen = ">=3.3"
# colcon builds the ROS2 workspace
colcon-common-extensions = "*"

[tasks]
# Build the whole workspace; USE_SUBMODULE=ON tells the CMake to build
# the bundled icp/ library instead of looking for a system-installed one.
build = { cmd = "colcon build --symlink-install --cmake-args -DUSE_SUBMODULE=ON \"-DCMAKE_PREFIX_PATH=$CONDA_PREFIX\"" }

# Wipe build artefacts so the next build starts clean.
clean = { cmd = "rm -rf build install log" }

# Launch the full car system (RPLIDAR + IMU + EKF + ICP odometry + PGO + Foxglove).
launch = { cmd = "bash -c 'source install/setup.bash && ros2 launch lidar_odometry carv2.py'" }

# Launch ICP odometry only (no hardware drivers, useful for testing with a bag).
launch-odom = { cmd = "bash -c 'source install/setup.bash && ros2 launch lidar_odometry lidar_odometry.launch.py'" }

# Check that the node executables were installed correctly.
check = { cmd = "bash -c 'source install/setup.bash && ros2 pkg executables lidar_odometry && ros2 pkg executables cev_pose_graph_slam'" }
